                        ### Meet the Pico 2
                        
                        <div class="r-stack r-stretch" style="justify-content: center;">
                            <img src="static/rp2350.png" alt="RP2350" style="margin: 0; padding: 0;" />
                            <img class="fragment current-visible" data-fragment-index="1" src="static/rp2350_proc.png" alt="RP2350" style="margin: 0; padding: 0;" />

                            <img class="fragment current-visible" data-fragment-index="5" src="static/rp2350_peripherals.png" alt="RP2350" style="margin: 0; padding: 0;" />
                            <img class="fragment current-visible" data-fragment-index="6" src="static/rp2350_serial.png" alt="RP2350" style="margin: 0; padding: 0;" />
                            <img class="fragment current-visible" data-fragment-index="7" src="static/rp2350_adc.png" alt="RP2350" style="margin: 0; padding: 0;" />
                            <img class="fragment fade-in" data-fragment-index="8" src="static/rp2350_watchdog.png" alt="RP2350" style="margin: 0; padding: 0;" />
                        </div>

                        <p style="font-size: large; margin: 0; padding: 0;"><it>
                        Source: <a href="https://datasheets.raspberrypi.com/rp2350/rp2350-datasheet.pdf">RP2350 Datasheet</a>, Figure 1
                        </it></p>

                        Notes:
                        - The RP2350 contains (non-exhaustive):
                          - two independent Cortex-M33 processors (top right, which in turn contain all of the circuitery discussed before. Note that this means that the RP2350 can do multithreading),
                          - a hardware clock (top left),
                          - \[a direct memory access (DMA) controller (top right),\]
                          - a bunch of memory (bottom right), including
                            - the boot ROM, which contains the microcontroller version of your computer's BIOS,
                            - 520 kB of RAM that you can use in your program, and 
                            - some read-only memory with things like a unique serial number,
                          - two banks of general-purpose IO (GPIO) pins (left) that you can use to connect to other chips, and
                          - a bunch of smaller processors called "peripherals" (middle left), which help you with various things like
                            - communicating over GPIO (implementing serial protocols like I2C, SPI, or UART),
                            - modulating and converting inputs / outputs (e.g. measuring analog voltages or temperatures), or
                            - making sure your code doesn't get stuck (watchdog).
