<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Embedded Workshop Intro</title>

    <link rel="stylesheet" href="dist/reset.css">
    <link rel="stylesheet" href="dist/reveal.css">
    <link rel="stylesheet" href="dist/theme/serif.css">

    <!-- Theme used for syntax highlighted code -->
    <link rel="stylesheet" href="plugin/highlight/monokai.css">

    <!-- Custom CSS -->
    <style>
        .columns {
            display: flex;
        }

        .col {
            flex: 1;
        }

        li {
            font-size: 90%;

            li li li {
                font-size: 100%;
            }
        }

        code {
            border-radius: 0.5em;
        }

        .svg-stack {
            position: relative;
            width: 900px;
            height: 600px;
            margin: 0 auto;
        }

        .svg-stack img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .fragment.current-visible.nospace:not(.current-fragment) {
            display: none;
            height: 0px;
            line-height: 0px;
            font-size: 0px;
        }

        .fragment.current-visible.nospace.current-fragment div code {
            max-height: 100%;
            overflow-x: hidden;
        }

        .fragment.current-visible.nospace.current-fragment div pre {
            width: 98%;
        }

        .fragment.current-visible.nospace.current-fragment {
            display: flex;
            position: fixed;
            overflow-y: hidden;
            z-index: 2400;
            opacity: 0.90;
            top: 0px !important;
            -webkit-transition: all 0.5s ease-in-out;
            -moz-transition: all 0.5s ease-in-out;
            -ms-transition: all 0.5s ease-in-out;
            -o-transition: all 0.5s ease-in-out;
            transition: all 0.5s ease-in-out;
        }

        .two-col {
            width: 100%;
            table-layout: fixed;
        }

        .two-col td {
            width: 50%;
            vertical-align: top;
        }

        table,
        th,
        td {
            border: none;
        }

        .reveal table th,
        .reveal table td {
            border: none !important;
        }
    </style>
</head>

<body>
    <div class="reveal">
        <div class="slides">
            <section>

                <section data-markdown data-separator-vertical="^\r?\n---\s*\r?\n$" data-separator-notes="^Notes:">
                    <textarea data-template>
                        ![Embedded Rust Logo](static/rust-embedded-logo-256x256.png)
                        ## Embedded Rust Workshop
                        #### Using `embassy` to control the Raspberry Pi Pico 2

                        ---

                        ### What You're Gonna Do Today

                        - Listen to a short introduction (in progress) <!-- .element: class="fragment" -->
                        - Get your Pico 2 hardware <!-- .element: class="fragment" -->
                        - Make it blink <!-- .element: class="fragment" -->
                        - Make it notice you <!-- .element: class="fragment" -->
                        - Break the workshop WiFi (probably) <!-- .element: class="fragment" -->
                        - Go at your own pace <!-- .element: class="fragment" -->

                        ---

                        ### Meet the Pico 2
                        
                        <div class="r-stack r-stretch" style="justify-content: center;">
                            <img src="static/rp2350.png" alt="RP2350" style="margin: 0; padding: 0;" />
                            <img class="fragment current-visible" data-fragment-index="1" src="static/rp2350_proc.png" alt="RP2350" style="margin: 0; padding: 0;" />
                            <img class="fragment current-visible" data-fragment-index="2" src="static/rp2350_memory.png" alt="RP2350" style="margin: 0; padding: 0;" />
                            <img class="fragment current-visible" data-fragment-index="3" src="static/rp2350_gpio.png" alt="RP2350" style="margin: 0; padding: 0;" />
                            <img class="fragment current-visible" data-fragment-index="4" src="static/rp2350_peripherals.png" alt="RP2350" style="margin: 0; padding: 0;" />
                            <img class="fragment current-visible" data-fragment-index="5" src="static/rp2350_serial.png" alt="RP2350" style="margin: 0; padding: 0;" />
                        </div>

                        <p style="font-size: large; margin: 0; padding: 0;"><it>
                        Source: <a href="https://datasheets.raspberrypi.com/rp2350/rp2350-datasheet.pdf">RP2350 Datasheet</a>, Figure 1
                        </it></p>

                        Notes:
                        - Most of this we don't care about for today, so here's the quick rundown of what you need to now: We have 
                          - two processor cores, of which we will only be using one today,
                          - a bunch of memory (in the bottom right) where you will be flashing your program to so it runs on the microcontroller,
                          - some GPIO pins that we'll be plugging other stuff into, and
                          - a bunch of smaller processors called "peripherals", of which we mostly care about the I2C bus peripheral today, which is an embedded communication channel (much like TCP for the web, but more... well, embedded).
                        
                        ---

                        <!-- .slide: data-transition="none" -->
                        ### Working with `#[no_std]`

                        <div class="svg-stack">
                            <img class="r-stretch" src="static/tiered-std-embassy-step1.svg" alt="Tiered STD" style="margin: 0; padding: 0;"/>

                            <img class="r-stretch fragment" src="static/tiered-std-embassy-step3.svg" alt="Tiered STD" style="margin: 0; padding: 0;" data-fragment-index="2"/>
                        </div>
                        
                        <p style="font-size: large; margin: 0; padding: 0;"><it>
                        Based on <a href="https://google.github.io/comprehensive-rust/bare-metal/no_std.html">Comprehensive Rust</a>
                        </it></p>

                        Notes:
                        - `HashMap` depends on RNG.
                        - `std` re-exports the contents of both `core` and `alloc`.
